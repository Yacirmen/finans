(() => {
  const ready = (fn) => {
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", fn, { once: true });
    } else {
      fn();
    }
  };

  ready(() => {
    const money = new Intl.NumberFormat("tr-TR", { maximumFractionDigits: 0 });
    const decimal = new Intl.NumberFormat("tr-TR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });

    const example = {
      company: "Diğer",
      assetPrice: "3000000",
      downPayment: "1000000",
      term: "48",
      monthlyPayment: "41667",
      delivery: "12",
      serviceFee: "11.8",
      rent: "25000",
      inflation: "32",
      creditRate: "3.19",
      yearlyIncrease: "15",
    };

    const assetPresets = {
      Konut: { assetPrice: 3000000, downPayment: 1000000, term: 48, monthlyPayment: 41667, delivery: 13, serviceFee: 7.5, rent: 25000, bankRate: 2.85, bankTerm: 60 },
      Araba: { assetPrice: 1850000, downPayment: 550000, term: 36, monthlyPayment: 38250, delivery: 6, serviceFee: 6.2, rent: 12000, bankRate: 3.45, bankTerm: 12 },
    };

    const modelTweaks = {
      cekilissiz: { deliveryDelta: 0, feeDelta: 0, monthlyDelta: 0 },
      cekilisli: { deliveryDelta: -1, feeDelta: 4.3, monthlyDelta: 0 },
    };

    const integerFields = ["assetPrice", "downPayment", "monthlyPayment", "rent"];
    const integerBankFields = ["amount"];
    const integerLimitFields = ["housingValue", "vehicleValue", "needValue"];

    const getCalculator = () => document.querySelector("[data-calculator]");
    const getCalculatorCard = () => getCalculator()?.querySelector("[data-calculator-card]");
    const getCalcViewTab = () => getCalculator()?.querySelector('[data-calc-view-tab].active')?.dataset.calcViewTab || "main";
    const getCompanySelect = () => getCalculator()?.querySelector("[data-company-select]");
    const getCompanyTrigger = () => getCompanySelect()?.querySelector("[data-company-trigger]");
    const getCompanyMenu = () => getCompanySelect()?.querySelector("[data-company-menu]");
    const getCompanyLabel = () => getCompanySelect()?.querySelector("[data-company-label]");
    const getCompanyChevron = () => getCompanySelect()?.querySelector("[data-company-chevron]");
    const field = (name) => getCalculator()?.querySelector('[data-field="' + name + '"]');
    const bankField = (name) => getCalculator()?.querySelector('[data-bank-field="' + name + '"]');
    const compareInput = (name) => getCalculator()?.querySelector('[data-compare-input="' + name + '"]');
    const preview = (name) => document.querySelector('[data-preview="' + name + '"]');
    const activeSegmentValue = (segmentName) => getCalculator()?.querySelector('[data-segment="' + segmentName + '"].active')?.dataset.value || "";

    const setCalcView = (view) => {
      const calculator = getCalculator();
      if (!calculator) return;
      calculator.querySelectorAll("[data-calc-view-tab]").forEach((button) => {
        button.classList.toggle("active", button.dataset.calcViewTab === view);
      });
      calculator.querySelectorAll("[data-calc-view-panel]").forEach((panel) => {
        panel.classList.toggle("hidden", panel.dataset.calcViewPanel !== view);
      });
    };

    const syncComparisonInputs = () => {
      const mappings = [
        ["assetPrice", field("assetPrice")?.value || ""],
        ["downPayment", field("downPayment")?.value || ""],
        ["term", field("term")?.value || ""],
        ["monthlyPayment", field("monthlyPayment")?.value || ""],
        ["delivery", field("delivery")?.value || ""],
        ["serviceFee", field("serviceFee")?.value || ""],
        ["rent", field("rent")?.value || ""],
        ["bankAmount", bankField("amount")?.value || ""],
        ["bankRate", bankField("rate")?.value || ""],
        ["bankTerm", bankField("term")?.value || ""],
      ];

      mappings.forEach(([key, value]) => {
        const input = compareInput(key);
        if (input && input.value !== value) input.value = value;
      });
    };

    const syncFromComparisonInput = (target) => {
      const key = target.dataset.compareInput;
      if (!key) return;
      const mainMap = {
        assetPrice: "assetPrice",
        downPayment: "downPayment",
        term: "term",
        monthlyPayment: "monthlyPayment",
        delivery: "delivery",
        serviceFee: "serviceFee",
        rent: "rent",
      };
      const bankMap = {
        bankAmount: "amount",
        bankRate: "rate",
        bankTerm: "term",
      };

      if (mainMap[key]) {
        const input = field(mainMap[key]);
        if (input) input.value = target.value;
      }

      if (bankMap[key]) {
        const input = bankField(bankMap[key]);
        if (input) input.value = target.value;
      }
    };

    const parseNumber = (value) => {
      const raw = String(value || "").trim();
      const normalized = raw.includes(",")
        ? raw.replace(/\./g, "").replace(",", ".")
        : /^\d+\.\d{1,2}$/.test(raw)
          ? raw
          : raw.replace(/\./g, "");
      const number = Number(normalized);
      return Number.isFinite(number) && number >= 0 ? number : 0;
    };

    const formatMoney = (value) => "₺" + money.format(Math.max(0, Math.round(value || 0)));
    const formatSignedMoney = (value) => {
      const safe = Math.round(value || 0);
      return (safe < 0 ? "-₺" : "₺") + money.format(Math.abs(safe));
    };
    const formatPercent = (value) => "%" + decimal.format(value || 0);

    const pulse = (element, className = "button-ack", duration = 320) => {
      if (!element) return;
      element.classList.remove(className);
      void element.offsetWidth;
      element.classList.add(className);
      window.setTimeout(() => element.classList.remove(className), duration);
    };

    const acknowledge = (...elements) => {
      elements.filter(Boolean).forEach((element) => pulse(element, "surface-ack", 420));
    };

    const focusCalculator = () => {
      const card = getCalculatorCard();
      if (!card) return;
      pulse(card, "calculator-focus", 980);
    };

    const setToggle = (button, active) => {
      button.dataset.on = String(active);
      const track = button.querySelector("span");
      const knob = track?.querySelector("span");
      track?.classList.toggle("bg-[var(--green)]", active);
      track?.classList.toggle("bg-slate-200", !active);
      knob?.classList.toggle("left-6", active);
      knob?.classList.toggle("left-1", !active);
    };

    const setPreviewText = (name, value) => {
      const node = preview(name);
      if (!node) return;
      if (node.textContent !== value) {
        node.textContent = value;
        pulse(node, "preview-swap", 300);
      }
    };

    const formatThousandsInput = (input) => {
      if (!input) return;
      const digits = String(input.value || "").replace(/\D/g, "");
      input.value = digits ? money.format(Number(digits)) : "";
    };

    const monthlyDiscountRate = (annualInflation) => Math.pow(1 + annualInflation / 100, 1 / 12) - 1;
    const presentValue = (amount, period, rate) => {
      if (!amount) return 0;
      if (!rate) return amount;
      return amount / Math.pow(1 + rate, Math.max(0, period));
    };

    const calculatePvPayments = (payment, term, annualInflation) => {
      const r = monthlyDiscountRate(annualInflation);
      if (!payment || !term) return 0;
      return Array.from({ length: term }).reduce((sum, _, index) => sum + payment / Math.pow(1 + r, index + 1), 0);
    };

    const calculatePayment = (principal, monthlyRate, term) => {
      if (!principal || !term) return 0;
      if (!monthlyRate) return principal / term;
      const factor = Math.pow(1 + monthlyRate, term);
      return principal * monthlyRate * factor / (factor - 1);
    };

    const solveMonthlyRate = (payment, term, presentValue) => {
      if (!payment || !term || !presentValue) return 0;
      let low = 0;
      let high = 1;
      for (let i = 0; i < 80; i += 1) {
        const mid = (low + high) / 2;
        const guess = calculatePayment(presentValue, mid, term);
        if (guess > payment) high = mid;
        else low = mid;
      }
      return (low + high) / 2;
    };

    const getBankConfig = (assetType, housingStatus) => {
      if (assetType === "Araba") {
        return { title: "Taşıt Kredisi Karşılaştırması", fee: 925.92, bsmv: 15, kkdf: 15, defaultRate: 3.45, defaultTerm: 12 };
      }

      return {
        title: "Konut Kredisi Karşılaştırması",
        fee: 39100,
        bsmv: housingStatus === "var" ? 15 : 0,
        kkdf: 0,
        defaultRate: 2.85,
        defaultTerm: 60,
      };
    };

    const calculateCreditModule = ({ principal, rate, term, fee, bsmv, kkdf }) => {
      const safePrincipal = Math.max(0, principal || 0);
      const safeRate = Math.max(0, rate || 0);
      const safeTerm = Math.max(0, term || 0);
      const safeFee = Math.max(0, fee || 0);
      const nominalMonthlyRate = safeRate / 100;
      const taxedMonthlyRate = nominalMonthlyRate * (1 + (bsmv + kkdf) / 100);
      const installment = calculatePayment(safePrincipal, taxedMonthlyRate, safeTerm);

      let balance = safePrincipal;
      let totalBaseInterest = 0;
      let totalBsmv = 0;
      let totalKkdf = 0;

      for (let i = 0; i < safeTerm; i += 1) {
        const baseInterest = balance * nominalMonthlyRate;
        const kkdfAmount = baseInterest * kkdf / 100;
        const bsmvAmount = baseInterest * bsmv / 100;
        const principalPart = installment - baseInterest - kkdfAmount - bsmvAmount;
        balance = Math.max(0, balance - principalPart);
        totalBaseInterest += baseInterest;
        totalBsmv += bsmvAmount;
        totalKkdf += kkdfAmount;
      }

      const totalRepaymentWithoutFees = safePrincipal + totalBaseInterest;
      const totalRepayment = totalRepaymentWithoutFees + safeFee;
      const netDisbursed = safePrincipal - safeFee;
      const effectiveMonthlyRate = solveMonthlyRate(installment, safeTerm, netDisbursed);
      const annualEffectiveCost = Math.pow(1 + effectiveMonthlyRate, 12) - 1;

      return {
        installment,
        totalBaseInterest,
        totalRepaymentWithoutFees,
        totalRepayment,
        netDisbursed,
        annualEffectiveCost,
      };
    };

    const getLimitSection = () => document.querySelector("[data-loan-limit]");
    const limitField = (name) => getLimitSection()?.querySelector('[data-limit-field="' + name + '"]');
    const limitPreview = (name) => getLimitSection()?.querySelector('[data-limit-preview="' + name + '"]');
    const activeLimitTab = () => getLimitSection()?.querySelector('[data-limit-tab-button][data-active="true"]')?.dataset.limitTabButton || "housing";

    const setLimitPreviewText = (name, value) => {
      const node = limitPreview(name);
      if (!node) return;
      if (node.textContent !== value) {
        node.textContent = value;
        pulse(node, "preview-swap", 300);
      }
    };

    const calculateHousingLimit = (value, energyClass, hasAnotherHome) => {
      const safeValue = Math.max(0, value || 0);
      const rules = [
        { max: 5000000, noHome: { "A-B": 0.9, C: 0.8, Diger: 0.7 }, hasHome: { "A-B": 0.225, C: 0.2, Diger: 0.175 } },
        { max: 7000000, noHome: { "A-B": 0.8, C: 0.7, Diger: 0.6 }, hasHome: { "A-B": 0.2, C: 0.175, Diger: 0.15 } },
        { max: 10000000, noHome: { "A-B": 0.7, C: 0.6, Diger: 0.5 }, hasHome: { "A-B": 0.175, C: 0.15, Diger: 0.125 } },
        { max: 20000000, noHome: { "A-B": 0.5, C: 0.4, Diger: 0.3 }, hasHome: { "A-B": 0.125, C: 0.1, Diger: 0.075 } },
        { max: Number.POSITIVE_INFINITY, noHome: { "A-B": 0.4, C: 0.3, Diger: 0.2 }, hasHome: { "A-B": 0.1, C: 0.075, Diger: 0.05 } },
      ];
      const rule = rules.find((item) => safeValue <= item.max) || rules[rules.length - 1];
      const ratio = hasAnotherHome ? rule.hasHome[energyClass] : rule.noHome[energyClass];
      return { ratio, amount: safeValue * ratio };
    };

    const calculateVehicleLimit = (value) => {
      const safeValue = Math.max(0, value || 0);
      if (safeValue > 2000000) {
        return { eligible: false, ratio: 0, amount: 0, message: "2.000.000 TL üstü taşıt bedelinde kredi kullandırılamaz." };
      }
      let ratio = 0.7;
      if (safeValue > 1200000) ratio = 0.2;
      else if (safeValue > 800000) ratio = 0.3;
      else if (safeValue > 400000) ratio = 0.5;
      return { eligible: true, ratio, amount: safeValue * ratio, message: "" };
    };

    const calculateNeedTerm = (value) => {
      const safeValue = Math.max(0, value || 0);
      if (safeValue <= 125000) return 36;
      if (safeValue <= 250000) return 24;
      return 12;
    };

    const calculateAutoDelivery = ({ assetPrice, downPayment, monthlyPayment, term }) => {
      if (!assetPrice || !term || !monthlyPayment) return 0;
      const fortyPercentGap = Math.max(0, term * (0.4 - downPayment / assetPrice));
      const monthlyGap = Math.max(0, ((assetPrice * 0.4) - downPayment) / monthlyPayment);
      return Math.max(Math.ceil(fortyPercentGap), Math.ceil(monthlyGap), 5);
    };

    const getCompareRoot = () => document.querySelector("[data-compare-root]");

    const buildCompareSchedule = (state) => {
      const baseMonthlyPayment = parseNumber(state.monthlyPayment);
      const yearlyIncrease = parseNumber(state.yearlyIncrease);

      if (state.manualPlan) {
        const parts = String(state.manualPlanText || "")
          .split(/[\n,;]+/)
          .map((item) => parseNumber(item))
          .filter((value) => value > 0);
        if (parts.length > 0) {
          return Array.from({ length: state.term }, (_, index) => parts[index] || parts[parts.length - 1]);
        }
      }

      if (state.escalating) {
        return Array.from({ length: state.term }, (_, index) => baseMonthlyPayment * Math.pow(1 + yearlyIncrease / 100, Math.floor(index / 12)));
      }

      return Array.from({ length: state.term }, () => baseMonthlyPayment);
    };

    const calculateCompareOffer = (assetType, state) => {
      const rawTerm = Math.max(1, Math.round(parseNumber(state.term)));
      const term = assetType === "Araba" ? Math.min(rawTerm, 60) : Math.min(rawTerm, 120);
      const assetPrice = parseNumber(state.assetPrice);
      const downPayment = parseNumber(state.downPayment);
      const monthlyPayment = parseNumber(state.monthlyPayment);
      const serviceFeeRate = parseNumber(state.serviceFee);
      const rent = parseNumber(state.rent);
      const inflation = parseNumber(state.inflation) || 25;
      const discountRate = monthlyDiscountRate(inflation);
      const suggestedDelivery = calculateAutoDelivery({ assetPrice, downPayment, monthlyPayment, term });
      const deliveryInput = Math.round(parseNumber(state.delivery));
      const delivery = Math.max(0, deliveryInput || suggestedDelivery);
      const feeAmount = assetPrice * serviceFeeRate / 100;
      const initialOutflow = downPayment + feeAmount;
      const schedule = buildCompareSchedule(state);

      let cumulative = initialOutflow;
      let pvInstallments = 0;
      let pvRent = 0;
      const cashflow = [{
        month: 0,
        installment: 0,
        rent: 0,
        serviceFee: initialOutflow,
        cumulativeOutflow: cumulative,
        presentValue: initialOutflow,
      }];

      schedule.forEach((payment, index) => {
        const month = index + 1;
        const rentAmount = month <= delivery ? rent * Math.pow(1 + inflation / 100, Math.floor((month - 1) / 12)) : 0;
        const pvInstallment = presentValue(payment, month, discountRate);
        const pvRentAmount = presentValue(rentAmount, month, discountRate);
        pvInstallments += pvInstallment;
        pvRent += pvRentAmount;
        cumulative += payment + rentAmount;
        cashflow.push({
          month,
          installment: payment,
          rent: rentAmount,
          serviceFee: 0,
          cumulativeOutflow: cumulative,
          presentValue: pvInstallment + pvRentAmount,
        });
      });

      const contractAmount = Math.max(assetPrice - downPayment, 0);
      const totalRepayment = schedule.reduce((sum, value) => sum + value, 0);
      const totalOutflow = initialOutflow + totalRepayment + cashflow.slice(1).reduce((sum, row) => sum + row.rent, 0);
      const pvBenefit = presentValue(assetPrice, delivery, discountRate);
      const score = pvBenefit - initialOutflow - pvInstallments - pvRent;
      const nbm = -score;
      const bankSummary = state.compareBank
        ? (() => {
            const config = getBankConfig(assetType, state.bankHousingStatus);
            const summary = calculateCreditModule({
              principal: parseNumber(state.bankAmount),
              rate: parseNumber(state.bankRate),
              term: Math.max(1, Math.round(parseNumber(state.bankTerm))),
              fee: config.fee,
              bsmv: config.bsmv,
              kkdf: config.kkdf,
            });
            return {
              installment: summary.installment,
              totalRepayment: summary.totalRepayment,
              annualEffectiveCost: summary.annualEffectiveCost,
            };
          })()
        : null;

      return {
        state,
        contractAmount,
        initialOutflow,
        feeAmount,
        totalRepayment,
        totalOutflow,
        pvBenefit,
        score,
        nbm,
        suggestedDelivery,
        cashflow,
        bankSummary,
      };
    };

    const collectCompareState = (root, offerIndex, assetType) => {
      const getValue = (field, fallback = "") => root.querySelector('[data-compare-offer="' + offerIndex + '"][data-compare-field="' + field + '"]')?.value || fallback;
      const getToggle = (name) => root.querySelector('[data-compare-offer="' + offerIndex + '"][data-compare-toggle-button="' + name + '"]')?.dataset.on === "true";
      const modelButton = root.querySelector('[data-compare-offer="' + offerIndex + '"][data-compare-model].active');
      return {
        company: getValue("company", "Diger"),
        model: modelButton?.dataset.compareModel || "cekilissiz",
        assetPrice: getValue("assetPrice"),
        downPayment: getValue("downPayment"),
        term: getValue("term"),
        monthlyPayment: getValue("monthlyPayment"),
        escalating: getToggle("escalating"),
        manualPlan: getToggle("manualPlan"),
        manualPlanText: getValue("manualPlanText"),
        delivery: getValue("delivery"),
        serviceFee: getValue("serviceFee"),
        rent: getValue("rent"),
        inflation: getValue("inflation", "25"),
        creditRate: getValue("creditRate", "3.19"),
        yearlyIncrease: getValue("yearlyIncrease", "15"),
        compareBank: getToggle("compareBank"),
        bankAmount: getValue("bankAmount", assetType === "Konut" ? "2.000.000" : "1.000.000"),
        bankRate: getValue("bankRate", assetType === "Konut" ? "2.85" : "3.45"),
        bankTerm: getValue("bankTerm", assetType === "Konut" ? "60" : "12"),
        bankHousingStatus: getValue("bankHousingStatus", "yok"),
      };
    };

    const setCompareToggleVisual = (button, active) => {
      if (!(button instanceof HTMLElement)) return;
      button.dataset.on = active ? "true" : "false";
      button.setAttribute("aria-pressed", String(active));
      const track = button.querySelector("span");
      const knob = track?.querySelector("span");
      track?.classList.toggle("bg-[#18a05a]", active);
      track?.classList.toggle("bg-[#d7e3ef]", !active);
      knob?.classList.toggle("left-6", active);
      knob?.classList.toggle("left-1", !active);
    };

    const setCompareResultCard = (root, offerIndex, result, highlighted) => {
      const card = root.querySelector('[data-compare-result-card="' + offerIndex + '"]');
      if (!(card instanceof HTMLElement)) return;
      const empty = card.querySelector("[data-compare-result-empty]");
      const content = card.querySelector("[data-compare-result-content]");
      const winner = card.querySelector("[data-compare-result-winner]");
      empty?.classList.add("hidden");
      content?.classList.remove("hidden");
      winner?.classList.toggle("hidden", !highlighted);
      card.dataset.highlighted = highlighted ? "true" : "false";
      card.classList.toggle("border-[#b8ebcc]", highlighted);
      card.classList.toggle("bg-[linear-gradient(180deg,#fbfffd_0%,#f0fbf5_100%)]", highlighted);
      card.classList.toggle("shadow-[0_18px_48px_rgba(24,160,90,0.14)]", highlighted);
      card.classList.toggle("border-[#dce7e2]", !highlighted);
      card.classList.toggle("bg-white", !highlighted);

      const setField = (name, value, extraClass) => {
        const node = card.querySelector('[data-compare-result-field="' + name + '"]');
        if (node) {
          node.textContent = value;
          if (extraClass) {
            node.classList.toggle(extraClass, highlighted);
          }
        }
      };

      setField("company", result.state.company);
      setField("model", result.state.model === "cekilisli" ? "Cekilisli model" : "Cekilissiz model");
      setField("initialOutflow", formatMoney(result.initialOutflow));
      setField("term", parseNumber(result.state.term) + " ay");
      setField("monthlyPayment", formatMoney(parseNumber(result.state.monthlyPayment)));
      setField("totalRepayment", formatMoney(result.totalRepayment));
      setField("totalOutflow", formatMoney(result.totalOutflow));
      setField("nbm", formatMoney(result.nbm), "text-[#168b53]");
      setField("downPayment", formatMoney(parseNumber(result.state.downPayment)));
      setField("serviceFee", formatPercent(parseNumber(result.state.serviceFee)));
      setField("contractAmount", formatMoney(result.contractAmount));
      setField("delivery", parseNumber(result.state.delivery) + ". ay");
      setField("suggestedDelivery", result.suggestedDelivery + ". ay");
      setField("pvBenefit", formatMoney(result.pvBenefit));
      setField("score", formatMoney(result.score), "text-[#168b53]");

      const bankSummary = card.querySelector("[data-compare-bank-summary]");
      if (result.bankSummary && bankSummary) {
        bankSummary.classList.remove("hidden");
        setField("bankInstallment", formatMoney(result.bankSummary.installment));
        setField("bankTotalRepayment", formatMoney(result.bankSummary.totalRepayment));
        setField("bankAnnualEffectiveCost", formatPercent(result.bankSummary.annualEffectiveCost * 100, 2));
      } else {
        bankSummary?.classList.add("hidden");
      }
    };

    const setCompareCashflow = (root, offerIndex, rows) => {
      const block = root.querySelector('[data-compare-cashflow-root="' + offerIndex + '"]');
      if (!(block instanceof HTMLElement)) return;
      const empty = block.querySelector("[data-compare-cashflow-empty]");
      const tableWrap = block.querySelector("[data-compare-cashflow-table]");
      const body = block.querySelector("[data-compare-cashflow-body]");
      const exportButton = block.querySelector('[data-compare-export="' + offerIndex + '"]');
      empty?.classList.add("hidden");
      tableWrap?.classList.remove("hidden");
      exportButton?.classList.remove("hidden");
      if (!(body instanceof HTMLElement)) return;
      body.innerHTML = rows.map((row) => {

    const exportCompareRows = (filename, rows) => {

        .join("\\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });

      const link = document.createElement("a");

    const calculateComparisonScenarios = () => {
      const assetPrice = parseNumber(field("assetPrice")?.value);
      const downPayment = parseNumber(field("downPayment")?.value);
      const term = parseNumber(field("term")?.value);
      const monthlyPayment = parseNumber(field("monthlyPayment")?.value);
      const delivery = parseNumber(field("delivery")?.value);
      const serviceFee = parseNumber(field("serviceFee")?.value);
      const rent = parseNumber(field("rent")?.value);
      const inflation = parseNumber(field("inflation")?.value) || 25;
      const discountRate = monthlyDiscountRate(inflation);

      const feeAmount = assetPrice * serviceFee / 100;
      const savingsInitial = downPayment + feeAmount;
      const savingsFinanced = Math.max(0, assetPrice - downPayment);
      const savingsPaymentsPv = Array.from({ length: term }).reduce((sum, _, index) => sum + presentValue(monthlyPayment, index + 1, discountRate), 0);
      const savingsRentPv = Array.from({ length: delivery }).reduce((sum, _, index) => sum + presentValue(rent, index + 1, discountRate), 0);
      const savingsBenefitPv = presentValue(assetPrice, delivery, discountRate);
      const savingsScore = savingsBenefitPv - savingsInitial - savingsPaymentsPv - savingsRentPv;

      const assetType = activeSegmentValue("assetType") || "Konut";
      const bankAmount = parseNumber(bankField("amount")?.value);
      const bankRate = parseNumber(bankField("rate")?.value);
      const bankTerm = parseNumber(bankField("term")?.value);
      const housingStatus = bankField("housingStatus")?.value || "yok";
      const bankConfig = getBankConfig(assetType, housingStatus);
      const bankResult = calculateCreditModule({
        principal: bankAmount,
        rate: bankRate,
        term: bankTerm,
        fee: bankConfig.fee,
        bsmv: bankConfig.bsmv,
        kkdf: bankConfig.kkdf,
      });
      const bankInitial = downPayment;
      const bankPaymentsPv = Array.from({ length: bankTerm }).reduce((sum, _, index) => sum + presentValue(bankResult.installment, index + 1, discountRate), 0);
      const bankScore = assetPrice - bankInitial - bankPaymentsPv;

      const autoDelivery = calculateAutoDelivery({ assetPrice, downPayment, monthlyPayment, term });
      const autoRentPv = Array.from({ length: autoDelivery }).reduce((sum, _, index) => sum + presentValue(rent, index + 1, discountRate), 0);
      const autoBenefitPv = presentValue(assetPrice, autoDelivery, discountRate);
      const autoScore = autoBenefitPv - savingsInitial - savingsPaymentsPv - autoRentPv;

      return {
        bank: {
          initial: bankInitial,
          financed: bankAmount,
          installment: bankResult.installment,
          total: bankInitial + bankResult.totalRepayment,
          score: bankScore,
        },
        savings: {
          initial: savingsInitial,
          financed: savingsFinanced,
          installment: monthlyPayment,
          delivery,
          score: savingsScore,
        },
        auto: {
          delivery: autoDelivery,
          score: autoScore,
        },
      };
    };

    const renderComparison = () => {

      setNode("[data-compare-bank-initial]", formatMoney(comparison.bank.initial));
      setNode("[data-compare-bank-financed]", formatMoney(comparison.bank.financed));
      setNode("[data-compare-bank-installment]", formatMoney(comparison.bank.installment));
      setNode("[data-compare-bank-total]", formatMoney(comparison.bank.total));
      setNode("[data-compare-bank-npv]", formatMoney(comparison.bank.score));
      setNode("[data-compare-savings-initial]", formatMoney(comparison.savings.initial));
      setNode("[data-compare-savings-financed]", formatMoney(comparison.savings.financed));
      setNode("[data-compare-savings-installment]", formatMoney(comparison.savings.installment));
      setNode("[data-compare-savings-delivery]", comparison.savings.delivery + ". ay");

      const candidates = [

        { label: "Otomatik teslim senaryosu öne çıkıyor", score: comparison.auto.score },
      ].sort((a, b) => b.score - a.score);

      const discountRate = monthlyDiscountRate(inflation);
      const feeAmount = assetPrice * serviceFee / 100;

      const rows = [{ month: 0, payment: downPayment + feeAmount, net: downPayment + feeAmount, pv: downPayment + feeAmount }];

!node) return;\n      if (node.textContent !== value) {\n        node.textContent = value;\n        pulse(node, \"preview-swap\", 300);\n      }\n    };\n\n    const calculateHousingLimit = (value, energyClass, hasAnotherHome) =\u003e {\n      const safeValue = Math.max(0, value || 0);\n      const rules = [\n        { max: 5000000, noHome: { \"A-B\": 0.9, C: 0.8, Diger: 0.7 }, hasHome: { \"A-B\": 0.225, C: 0.2, Diger: 0.175 } },\n        { max: 7000000, noHome: { \"A-B\": 0.8, C: 0.7, Diger: 0.6 }, hasHome: { \"A-B\": 0.2, C: 0.175, Diger: 0.15 } },\n        { max: 10000000, noHome: { \"A-B\": 0.7, C: 0.6, Diger: 0.5 }, hasHome: { \"A-B\": 0.175, C: 0.15, Diger: 0.125 } },\n        { max: 20000000, noHome: { \"A-B\": 0.5, C: 0.4, Diger: 0.3 }, hasHome: { \"A-B\": 0.125, C: 0.1, Diger: 0.075 } },\n        { max: Number.POSITIVE_INFINITY, noHome: { \"A-B\": 0.4, C: 0.3, Diger: 0.2 }, hasHome: { \"A-B\": 0.1, C: 0.075, Diger: 0.05 } },\n      ];\n      const rule = rules.find((item) =\u003e safeValue \u003c= item.max) || rules[rules.length - 1];\n      const ratio = hasAnotherHome ? rule.hasHome[energyClass] : rule.noHome[energyClass];\n      return { ratio, amount: safeValue * ratio };\n    };\n\n    const calculateVehicleLimit = (value) =\u003e {\n      const safeValue = Math.max(0, value || 0);\n      if (safeValue \u003e 2000000) {\n        return { eligible: false, ratio: 0, amount: 0, message: \"2.000.000 TL üstü taşıt bedelinde kredi kullandırılamaz.\" };\n      }\n      let ratio = 0.7;\n      if (safeValue \u003e 1200000) ratio = 0.2;\n      else if (safeValue \u003e 800000) ratio = 0.3;\n      else if (safeValue \u003e 400000) ratio = 0.5;\n      return { eligible: true, ratio, amount: safeValue * ratio, message: \"\" };\n    };\n\n    const calculateNeedTerm = (value) =\u003e {\n      const safeValue = Math.max(0, value || 0);\n      if (safeValue \u003c= 125000) return 36;\n      if (safeValue \u003c= 250000) return 24;\n      return 12;\n    };\n\n    con
